modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
showAsResourcePack=false


[[mods]]
	modId="${mod_id}"
	version="${mod_version}"
	displayName="${mod_name}"
	updateJSONURL="https://mods.rluo.dev/authagain/versions.json"
	displayURL="https://mods.rluo.dev"
	logoFile="logo.png"
	credits=""
	authors="Ruien Luo"
	description='''
	${mod_description}
	'''

	[[dependencies.authagain]]
	modId="neoforge"
	mandatory=true
	versionRange="${forge_version_range}"
	ordering="NONE"
	side="BOTH"

	[[dependencies.authagain]]
	modId="minecraft"
	mandatory=true
	versionRange="${minecraft_version_range}"
	ordering="NONE"
	side="BOTH"
